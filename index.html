<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Karangasem Festival - website event, rundown, gallery, dan merchandise dengan cart serta dashboard admin."
    />
    <title>Karangasem Festival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="#/home" aria-label="Karangasem Festival Home">
          <span class="brand-mark">KF</span>
          <span class="brand-text">
            <strong>Karangasem Festival</strong>
            <small>Culture, music, and sunset stories</small>
          </span>
        </a>

        <nav class="nav">
          <a href="#/home" data-route-link="home">Home</a>
          <a href="#/about" data-route-link="about">About</a>
          <a href="#/history" data-route-link="history">History</a>
          <a href="#/rundown" data-route-link="rundown">Rundown</a>
          <a href="#/merchandise" data-route-link="merchandise">Merchandise</a>
          <a href="#/gallery" data-route-link="gallery">Gallery</a>
          <a class="nav-admin" href="#/admin" data-route-link="admin">Admin</a>
        </nav>

        <a class="cart-chip" href="#/merchandise" aria-label="Buka merchandise">
          <span>Cart</span>
          <strong id="nav-cart-count">0</strong>
        </a>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>

      <footer class="footer">
        <div>
          <strong>Karangasem Festival</strong>
          <p>Festival budaya, musik, dan kreatif untuk merayakan identitas Karangasem.</p>
        </div>
        <div>
          <p>Merchandise checkout memakai QR statis demo dan upload bukti transaksi.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
